workflows:
  android-apk-build:
    name: Build Android APK (Simple)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    scripts:
      - name: Set Android SDK location
        script: | 
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install npm dependencies
        script: | 
          npm install --legacy-peer-deps
          # ارتقا به نسخه ۰.۷۶.۵ برای هماهنگی کامل با کدهای اندروید شما
          npm install @react-native/metro-config@0.76.5 @react-native/babel-preset@0.76.5 --save-dev --legacy-peer-deps
          npm uninstall metro-react-native-babel-preset || true
          npm install react-native-safe-area-context@4.14.1 react-native-gesture-handler@2.21.2 react-native-screens@3.35.0 --legacy-peer-deps
          
      - name: Auto-Fix Config Files
        script: |
          echo "module.exports = { presets: ['module:@react-native/babel-preset'] };" > babel.config.js
          echo "const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config'); module.exports = mergeConfig(getDefaultConfig(__dirname), {});" > metro.config.js
          
      - name: Ultimate Android Version & Manifest Fix
        script: |
          node -e "
          const fs=require('fs'); 
          const bg='android/build.gradle';
          if(fs.existsSync(bg)){
            let c=fs.readFileSync(bg,'utf8');
            c=c.replace(/compileSdkVersion\s*=\s*\d+/g, 'compileSdkVersion = 35');
            c=c.replace(/targetSdkVersion\s*=\s*\d+/g, 'targetSdkVersion = 35');
            c=c.replace(/compileSdk\s*=\s*\d+/g, 'compileSdk = 35');
            c=c.replace(/targetSdk\s*=\s*\d+/g, 'targetSdk = 35');
            c=c.replace(/kotlinVersion\s*=\s*['\"][^'\"]+['\"]/g, \"kotlinVersion = '1.9.24'\");
            fs.writeFileSync(bg,c);
          }"
          sed -i '' 's/\${usesCleartextTraffic}/true/g' android/app/src/main/AndroidManifest.xml || true
          
      - name: Build Android APK
        script: | 
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk