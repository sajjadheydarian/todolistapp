workflows:
  android-apk-build:
    name: Build Android APK (Simple)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    scripts:
      - name: Set Android SDK location
        script: | 
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install npm dependencies
        script: | 
          npm install --legacy-peer-deps
          npm install @react-native/metro-config@0.75.4 @react-native/babel-preset@0.75.4 --save-dev --legacy-peer-deps
          npm uninstall metro-react-native-babel-preset || true
          
          # نصب دقیق نسخه‌های سازگار با موتور 0.75 که مشکل کاتلین را هم ندارند
          npm install react-native-safe-area-context@4.14.1 react-native-gesture-handler@2.21.2 react-native-screens@3.35.0 --legacy-peer-deps
          
      - name: Auto-Fix Config Files
        script: |
          echo "module.exports = { presets: ['module:@react-native/babel-preset'] };" > babel.config.js
          echo "const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config'); module.exports = mergeConfig(getDefaultConfig(__dirname), {});" > metro.config.js
          
      - name: Ultimate AndroidX & Manifest Fix
        script: |
          cat << 'EOF' >> android/build.gradle
          
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'androidx.core:core:1.15.0'
                      force 'androidx.core:core-ktx:1.15.0'
                  }
              }
          }
          EOF
          node -e "const fs=require('fs'); ['android/build.gradle','android/settings.gradle'].forEach(f=>{if(fs.existsSync(f)){let c=fs.readFileSync(f,'utf8');fs.writeFileSync(f,c.replace(/8\.5\.0/g,'8.6.1'));}});"
          sed -i '' 's/\${usesCleartextTraffic}/true/g' android/app/src/main/AndroidManifest.xml || true
          
      - name: Build Android APK
        script: | 
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk