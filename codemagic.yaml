workflows:
  android-apk-build:
    name: Build Android APK (Simple)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    scripts:
      - name: Set Android SDK location
        script: | 
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install npm dependencies
        script: | 
          npm install --legacy-peer-deps
          
          # استخراج نسخه دقیق ری‌اکت نیتیو پروژه شما
          RN_VERSION=$(node -p "require('./node_modules/react-native/package.json').version")
          echo "React Native version detected: $RN_VERSION"
          
          # نصب افزونه‌ها دقیقاً هم‌نسخه با پروژه شما
          npm install @react-native/gradle-plugin@$RN_VERSION @react-native/metro-config@$RN_VERSION --no-save
          
      - name: Build Android APK
        script: | 
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk